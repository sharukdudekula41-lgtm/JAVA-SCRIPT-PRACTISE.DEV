<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <title>Password Strength Blur Effect</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            height: 100vh;
            overflow: hidden;
        }

        .bg {
            background: url("https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTSr7X7S7SnlHMNDzaX3BHXLv2Nx5MlG5xzc2NFKkU8M60g2gLFKfhbvlA&s")
                center center/cover no-repeat;

            position: fixed;
            top: -20px;
            left: -20px;
            width: calc(100vw + 40px);
            height: calc(100vh + 40px);
            z-index: -1;
            filter: blur(20px);
        }

        .card {
            width: 350px;
        }
    </style>
</head>

<body>

    <div class="bg" id="bg"></div>

    <div class="container d-flex justify-content-center align-items-center vh-100">

        <div class="card p-4 shadow">

            <h3 class="text-center">Image Password Strength</h3>

            <p class="text-center text-muted">
                Change password to see the blur effect
            </p>

            <form>

                <div class="mb-3">
                    <label class="form-label">Email</label>

                    <input
                        type="email"
                        class="form-control"
                        placeholder="Enter Email">
                </div>

                <div class="mb-3">
                    <label class="form-label">Password</label>

                    <input
                        type="password"
                        class="form-control"
                        placeholder="Enter Password"
                        id="password">
                </div>

                <button class="btn btn-dark w-100">
                    Submit
                </button>

            </form>

        </div>

    </div>

    <script>
        const password = document.getElementById("password");
        const bg = document.getElementById("bg");

        password.addEventListener("input", function () {

            let length = password.value.length;

            let blur = 20 - length * 2;

            if (blur < 0) {
                blur = 0;
            }

            bg.style.filter = `blur(${blur}px)`;

        });
    </script>

</body>
</html>
